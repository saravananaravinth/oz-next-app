# oz-next-app/wrangler.toml
#
# Architecture:
#   Browser -> oz-next-app OpenNext Worker -> oz-erp-edge Worker -> private oz-erp-api Cloud Run
#
# Security rules:
#   - Do not place secrets in this file.
#   - Do not expose Cloud Run URLs, service account credentials, JWT secrets, database URLs,
#     Redis URLs, webhook secrets, R2 secrets, or tokens.
#   - NEXT_PUBLIC_API_BASE_URL must always point to the public oz-erp-edge Worker origin.

name = "oz-next-app"
main = ".open-next/worker.js"
compatibility_date = "2026-07-22"
compatibility_flags = [
  "nodejs_compat",
  "global_fetch_strictly_public",
]

workers_dev = false
preview_urls = false
upload_source_maps = true

# Required for OpenNext Cloudflare.
# Prevents Wrangler/esbuild from injecting __name helpers into generated scripts,
# which can break next-themes/runtime string-evaluated scripts in production.
keep_names = false

[[routes]]
pattern = "erp.ozotecev.com/*"
zone_name = "ozotecev.com"

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

[images]
binding = "IMAGES"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "oz-next-app"

# Server-side ERP API calls must use Cloudflare's internal service binding.
# Browser/client code still uses NEXT_PUBLIC_API_BASE_URL.
[[services]]
binding = "ERP_EDGE"
service = "oz-erp-edge"

[placement]
region = "gcp:asia-south1"

[observability]
enabled = true
head_sampling_rate = 0.1

[vars]
NEXTJS_ENV = "production"

NEXT_PUBLIC_APP_ENV = "production"
NEXT_PUBLIC_APP_ORIGIN = "https://erp.ozotecev.com"
NEXT_PUBLIC_API_BASE_URL = "https://api.erp.ozotecev.com"
NEXT_PUBLIC_AUTH_CLIENT_ID = "erp-web"
NEXT_PUBLIC_APP_VERSION = "0.1.0"
NEXT_PUBLIC_LOG_LEVEL = "warn"
