# oz-next-app/.github/workflows/deploy.yml
name: Deploy oz-next-app to Cloudflare Worker

run-name: Deploy oz-next-app @ ${{ github.sha }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type override. Use auto for Conventional Commit based versioning."
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
          - none

concurrency:
  group: oz-next-app-production-worker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-deploy-release:
    name: Verify, build, deploy, and release
    runs-on: ubuntu-24.04
    environment: production
    timeout-minutes: 45

    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_VERSION: "24"

      WORKER_NAME: oz-next-app
      WORKER_ROUTE: erp.ozotecev.com/*
      RELEASE_NAME: oz-next-app
      REQUESTED_RELEASE_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type || 'auto' }}

      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_APP_ORIGIN: https://erp.ozotecev.com
      NEXT_PUBLIC_API_BASE_URL: https://api.erp.ozotecev.com
      NEXT_PUBLIC_AUTH_CLIENT_ID: erp-web

      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch git tags
        shell: bash
        run: git fetch --force --tags

      - name: Validate required deployment config
        shell: bash
        run: |
          set -euo pipefail

          required_env=(
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            WORKER_NAME
            WORKER_ROUTE
            RELEASE_NAME
            REQUESTED_RELEASE_TYPE
            NEXT_PUBLIC_APP_ENV
            NEXT_PUBLIC_APP_ORIGIN
            NEXT_PUBLIC_API_BASE_URL
            NEXT_PUBLIC_AUTH_CLIENT_ID
          )

          missing=0
          for key in "${required_env[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error title=Missing deployment config::${key} is not configured."
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

          case "${REQUESTED_RELEASE_TYPE}" in
            auto|patch|minor|major|none) ;;
            *)
              echo "::error title=Invalid release type::release_type must be auto, patch, minor, major, or none."
              exit 1
              ;;
          esac

          case "${WORKER_ROUTE}" in
            */*) ;;
            *)
              echo "::error title=Invalid WORKER_ROUTE::Worker route must include a path suffix such as /*."
              exit 1
              ;;
          esac

          python <<'PY'
          import os
          import re
          import sys
          from urllib.parse import urlparse

          def fail(title: str, detail: str) -> None:
              print(f"::error title={title}::{detail}")
              sys.exit(1)

          app_env = os.environ["NEXT_PUBLIC_APP_ENV"]
          app_origin = os.environ["NEXT_PUBLIC_APP_ORIGIN"]
          api_base_url = os.environ["NEXT_PUBLIC_API_BASE_URL"]
          auth_client_id = os.environ["NEXT_PUBLIC_AUTH_CLIENT_ID"]

          if app_env != "production":
              fail("Invalid app environment", "NEXT_PUBLIC_APP_ENV must be production for this workflow.")

          for name, value in {
              "NEXT_PUBLIC_APP_ORIGIN": app_origin,
              "NEXT_PUBLIC_API_BASE_URL": api_base_url,
          }.items():
              parsed = urlparse(value)
              if parsed.scheme != "https" or not parsed.netloc:
                  fail("Invalid HTTPS origin", f"{name} must be an absolute HTTPS origin.")
              if parsed.username or parsed.password:
                  fail("Unsafe URL", f"{name} must not contain credentials.")
              if parsed.query or parsed.fragment:
                  fail("Unsafe URL", f"{name} must not contain query strings or fragments.")

          if api_base_url not in {"https://api.erp.ozotecev.com", "https://api.ozotecev.com"}:
              fail(
                  "Invalid API origin",
                  "NEXT_PUBLIC_API_BASE_URL must point to the public oz-erp-edge Worker origin.",
              )

          if re.search(r"(run\.app|cloudrun|localhost|127\.0\.0\.1)", api_base_url, re.IGNORECASE):
              fail(
                  "Unsafe API origin",
                  "NEXT_PUBLIC_API_BASE_URL must not point to private backend infrastructure.",
              )

          if not re.fullmatch(r"[A-Za-z0-9._:-]{2,128}", auth_client_id):
              fail("Invalid auth client ID", "NEXT_PUBLIC_AUTH_CLIENT_ID contains unsupported characters.")
          PY

      - name: Validate Worker deployment manifest
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f wrangler.jsonc ]]; then
            echo "::error title=Legacy Wrangler config present::Remove wrangler.jsonc. oz-next-app must use wrangler.toml as the only deployment manifest."
            exit 1
          fi

          if [[ ! -f wrangler.toml ]]; then
            echo "::error title=Missing wrangler.toml::Cloudflare Worker deployment requires wrangler.toml."
            exit 1
          fi

          python <<'PY'
          import datetime as dt
          import os
          import re
          import sys
          import tomllib
          from pathlib import Path
          from urllib.parse import urlparse

          CONFIG_PATH = Path("wrangler.toml")
          MIN_COMPATIBILITY_DATE = dt.date(2024, 9, 23)

          ALLOWED_PUBLIC_VARS = {
              "NEXTJS_ENV",
              "NEXT_PUBLIC_APP_ENV",
              "NEXT_PUBLIC_APP_ORIGIN",
              "NEXT_PUBLIC_API_BASE_URL",
              "NEXT_PUBLIC_AUTH_CLIENT_ID",
              "NEXT_PUBLIC_APP_VERSION",
              "NEXT_PUBLIC_LOG_LEVEL",
          }

          REQUIRED_PUBLIC_VARS = {
              "NEXT_PUBLIC_APP_ENV",
              "NEXT_PUBLIC_APP_ORIGIN",
              "NEXT_PUBLIC_API_BASE_URL",
              "NEXT_PUBLIC_AUTH_CLIENT_ID",
              "NEXT_PUBLIC_APP_VERSION",
          }

          SECRET_LIKE_KEY_RE = re.compile(
              r"(DATABASE_URL|REDIS_URL|JWT_|SERVICE_ACCOUNT|PRIVATE_KEY|TOKEN_HASH|TASK_SHARED_SECRET|R2_SECRET|OTP_HMAC|WEBHOOK_HMAC|AUTH_KEY|API_KEY|PASSWORD)",
              re.IGNORECASE,
          )

          SECRET_LIKE_VALUE_RE = re.compile(
              r"(-----BEGIN|run\.app|postgres://|postgresql://|redis://|Bearer\s+|eyJ[A-Za-z0-9_-]+\.)",
              re.IGNORECASE,
          )

          def fail(title: str, detail: str) -> None:
              print(f"::error title={title}::{detail}")
              sys.exit(1)

          def require(condition: bool, title: str, detail: str) -> None:
              if not condition:
                  fail(title, detail)

          def parse_https_origin(name: str, value: str) -> str:
              parsed = urlparse(value)
              require(
                  parsed.scheme == "https" and bool(parsed.netloc),
                  "Invalid HTTPS origin",
                  f"{name} must be an absolute HTTPS origin.",
              )
              require(
                  not parsed.username and not parsed.password,
                  "Unsafe URL",
                  f"{name} must not contain credentials.",
              )
              require(
                  not parsed.query and not parsed.fragment,
                  "Unsafe URL",
                  f"{name} must not contain query strings or fragments.",
              )
              return f"{parsed.scheme}://{parsed.netloc}"

          try:
              config = tomllib.loads(CONFIG_PATH.read_text(encoding="utf-8"))
          except tomllib.TOMLDecodeError as error:
              fail("Invalid wrangler.toml", str(error))

          worker_name = os.environ["WORKER_NAME"]
          worker_route = os.environ["WORKER_ROUTE"]
          expected_app_origin = os.environ["NEXT_PUBLIC_APP_ORIGIN"]
          expected_api_origin = os.environ["NEXT_PUBLIC_API_BASE_URL"]
          expected_app_env = os.environ["NEXT_PUBLIC_APP_ENV"]
          expected_auth_client_id = os.environ["NEXT_PUBLIC_AUTH_CLIENT_ID"]

          require(config.get("name") == worker_name, "Invalid Worker name", f"wrangler.toml name must be {worker_name}.")
          require(config.get("main") == ".open-next/worker.js", "Invalid Worker entrypoint", "main must be .open-next/worker.js.")
          require(config.get("workers_dev") is False, "Unsafe Worker exposure", "workers_dev must be false for production.")
          require(config.get("preview_urls") is False, "Unsafe preview exposure", "preview_urls must be false for production.")
          require(config.get("upload_source_maps") is True, "Missing source map upload", "upload_source_maps must be true.")

          raw_compatibility_date = config.get("compatibility_date")
          require(isinstance(raw_compatibility_date, str), "Missing compatibility date", "compatibility_date must be configured.")
          try:
              compatibility_date = dt.date.fromisoformat(raw_compatibility_date)
          except ValueError:
              fail("Invalid compatibility date", "compatibility_date must use YYYY-MM-DD.")

          require(
              compatibility_date >= MIN_COMPATIBILITY_DATE,
              "Compatibility date too old",
              "OpenNext Cloudflare requires compatibility_date on or after 2024-09-23.",
          )

          compatibility_flags = config.get("compatibility_flags")
          require(isinstance(compatibility_flags, list), "Missing compatibility flags", "compatibility_flags must be an array.")
          require("nodejs_compat" in compatibility_flags, "Missing compatibility flag", "nodejs_compat is required.")
          require(
              "global_fetch_strictly_public" in compatibility_flags,
              "Missing compatibility flag",
              "global_fetch_strictly_public is required.",
          )

          routes = config.get("routes")
          require(isinstance(routes, list) and len(routes) > 0, "Missing Worker route", "wrangler.toml must define at least one route.")
          require(
              any(isinstance(route, dict) and route.get("pattern") == worker_route for route in routes),
              "Route mismatch",
              f"wrangler.toml routes must include {worker_route}.",
          )

          app_origin_host = urlparse(expected_app_origin).netloc
          require(
              any(
                  isinstance(route, dict)
                  and isinstance(route.get("pattern"), str)
                  and route["pattern"].replace("/*", "") == app_origin_host
                  for route in routes
              ),
              "Route origin mismatch",
              "Worker route host must match NEXT_PUBLIC_APP_ORIGIN host.",
          )

          assets = config.get("assets")
          require(isinstance(assets, dict), "Missing assets binding", "OpenNext assets binding is required.")
          require(assets.get("binding") == "ASSETS", "Invalid assets binding", "assets.binding must be ASSETS.")
          require(
              assets.get("directory") == ".open-next/assets",
              "Invalid assets directory",
              "assets.directory must be .open-next/assets.",
          )

          images = config.get("images")
          require(isinstance(images, dict), "Missing images binding", "OpenNext image optimization binding is required.")
          require(images.get("binding") == "IMAGES", "Invalid images binding", "images.binding must be IMAGES.")

          services = config.get("services")
          require(isinstance(services, list), "Missing service bindings", "services must be configured.")
          require(
              any(
                  isinstance(service, dict)
                  and service.get("binding") == "WORKER_SELF_REFERENCE"
                  and service.get("service") == worker_name
                  for service in services
              ),
              "Invalid self-reference service",
              "WORKER_SELF_REFERENCE must point to oz-next-app.",
          )

          placement = config.get("placement")
          require(isinstance(placement, dict), "Missing placement", "placement must be configured.")
          require(
              placement.get("region") == "gcp:asia-south1",
              "Invalid placement",
              "placement.region must be gcp:asia-south1.",
          )

          observability = config.get("observability")
          require(isinstance(observability, dict), "Missing observability", "observability must be configured.")
          require(observability.get("enabled") is True, "Observability disabled", "observability.enabled must be true.")

          vars_section = config.get("vars")
          require(isinstance(vars_section, dict), "Missing vars", "wrangler.toml must contain a [vars] table.")

          missing_vars = sorted(REQUIRED_PUBLIC_VARS - vars_section.keys())
          require(
              len(missing_vars) == 0,
              "Missing public runtime variable",
              f"wrangler.toml must define: {', '.join(missing_vars)}.",
          )

          unexpected_vars = sorted(set(vars_section.keys()) - ALLOWED_PUBLIC_VARS)
          require(
              len(unexpected_vars) == 0,
              "Unexpected runtime variable",
              f"wrangler.toml contains unsupported variable(s): {', '.join(unexpected_vars)}.",
          )

          for key, value in vars_section.items():
              require(
                  isinstance(value, str) and len(value.strip()) > 0,
                  "Invalid runtime variable",
                  f"{key} must be a non-empty string.",
              )
              require(
                  key == "NEXTJS_ENV" or key.startswith("NEXT_PUBLIC_"),
                  "Unsafe runtime variable",
                  f"{key} is not browser-safe for this frontend Worker.",
              )
              require(
                  SECRET_LIKE_KEY_RE.search(key) is None,
                  "Secret-like variable name",
                  f"{key} must not be configured in wrangler.toml.",
              )
              require(
                  SECRET_LIKE_VALUE_RE.search(value) is None,
                  "Secret-like variable value",
                  f"{key} contains an unsafe value.",
              )

          require(vars_section["NEXT_PUBLIC_APP_ENV"] == expected_app_env, "App env mismatch", "wrangler.toml app env must match workflow env.")
          require(vars_section["NEXT_PUBLIC_APP_ORIGIN"] == expected_app_origin, "App origin mismatch", "wrangler.toml app origin must match workflow env.")
          require(vars_section["NEXT_PUBLIC_API_BASE_URL"] == expected_api_origin, "API origin mismatch", "wrangler.toml API origin must match workflow env.")
          require(vars_section["NEXT_PUBLIC_AUTH_CLIENT_ID"] == expected_auth_client_id, "Auth client mismatch", "wrangler.toml auth client must match workflow env.")

          parse_https_origin("NEXT_PUBLIC_APP_ORIGIN", vars_section["NEXT_PUBLIC_APP_ORIGIN"])
          api_origin = parse_https_origin("NEXT_PUBLIC_API_BASE_URL", vars_section["NEXT_PUBLIC_API_BASE_URL"])
          require(
              api_origin in {"https://api.erp.ozotecev.com", "https://api.ozotecev.com"},
              "Invalid API origin",
              "NEXT_PUBLIC_API_BASE_URL must point to the public oz-erp-edge Worker origin.",
          )
          PY

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Print toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          git --version
          python3 --version

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Validate Wrangler CLI
        shell: bash
        run: npm exec -- wrangler --version

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          package_json_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [[ ! "${package_json_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid package version::package.json version must be SemVer major.minor.patch."
            exit 1
          fi

          short_sha="$(git rev-parse --short=12 HEAD)"
          requested_release_type="${REQUESTED_RELEASE_TYPE:-auto}"

          case "${requested_release_type}" in
            auto|patch|minor|major|none) ;;
            *)
              echo "::error title=Invalid release type::release_type must be auto, patch, minor, major, or none."
              exit 1
              ;;
          esac

          version_candidates="$({
            gh release list --limit 100 --json tagName,name --jq '.[] | [.tagName, .name] | .[]' 2>/dev/null || true
            git tag --list "${RELEASE_NAME}-v*" || true
          } | awk -v tag_prefix="${RELEASE_NAME}-v" -v title_prefix="${RELEASE_NAME} v" '
            index($0, tag_prefix) == 1 {
              value = substr($0, length(tag_prefix) + 1)
              if (match(value, /^[0-9]+\.[0-9]+\.[0-9]+/)) {
                print substr(value, RSTART, RLENGTH)
              }
            }
            index($0, title_prefix) == 1 {
              value = substr($0, length(title_prefix) + 1)
              if (match(value, /^[0-9]+\.[0-9]+\.[0-9]+/)) {
                print substr(value, RSTART, RLENGTH)
              }
            }
          ' | sort -Vu | uniq)"

          base_version="$(printf '%s\n' "${version_candidates}" | sed '/^$/d' | tail -n 1)"
          first_release=false
          if [[ -z "${base_version}" ]]; then
            base_version="${package_json_version}"
            first_release=true
          fi

          previous_tag=""
          if [[ "${first_release}" == "false" ]]; then
            previous_tag="$(git tag --list "${RELEASE_NAME}-v${base_version}*" | sort -V | tail -n 1 || true)"

            if [[ -z "${previous_tag}" ]]; then
              previous_tag="$(gh release list --limit 100 --json tagName,name --jq '.[] | [.tagName, .name] | @tsv' 2>/dev/null \
                | awk -F '\t' -v release_name="${RELEASE_NAME}" -v version="${base_version}" '
                    $1 ~ "^" release_name "-v" version { print $1; exit }
                    $2 == release_name " v" version { print $1; exit }
                  ' || true)"
            fi
          fi

          commit_range=""
          if [[ -n "${previous_tag}" ]] && git rev-parse -q --verify "${previous_tag}^{commit}" >/dev/null; then
            commit_range="${previous_tag}..HEAD"
          fi

          git_log_args=()
          if [[ -n "${commit_range}" ]]; then
            git_log_args+=("${commit_range}")
          fi

          commit_messages="$(git log "${git_log_args[@]}" --pretty=%B)"

          release_type="none"
          if [[ "${requested_release_type}" == "none" ]]; then
            release_type="none"
          elif [[ "${requested_release_type}" != "auto" ]]; then
            release_type="${requested_release_type}"
          elif printf '%s\n' "${commit_messages}" | grep -Eq '(^BREAKING CHANGE:|^BREAKING-CHANGE:|^[a-zA-Z]+(\([^)]+\))?!:)'; then
            release_type="major"
          elif printf '%s\n' "${commit_messages}" | grep -Eq '^feat(\([^)]+\))?:'; then
            release_type="minor"
          elif printf '%s\n' "${commit_messages}" | grep -Eq '^(fix|perf|security|revert)(\([^)]+\))?:'; then
            release_type="patch"
          fi

          if [[ "${release_type}" == "none" ]]; then
            echo "::notice title=No production release::No releasable Conventional Commit was found. Verification completed; Worker deploy and GitHub release steps will be skipped."
            {
              echo "release_required=false"
              echo "release_type=none"
              echo "base_version=${base_version}"
              echo "previous_tag=${previous_tag}"
              echo "commit_range=${commit_range}"
              echo "short_sha=${short_sha}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          IFS='.' read -r current_major current_minor current_patch <<< "${base_version}"

          if [[ "${first_release}" == "true" ]]; then
            next_version="${base_version}"
          elif [[ "${release_type}" == "major" ]]; then
            next_version="$((current_major + 1)).0.0"
          elif [[ "${release_type}" == "minor" ]]; then
            next_version="${current_major}.$((current_minor + 1)).0"
          else
            next_version="${current_major}.${current_minor}.$((current_patch + 1))"
          fi

          release_tag="${RELEASE_NAME}-v${next_version}"
          release_title="${RELEASE_NAME} v${next_version}"

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            echo "::error title=Release already exists::${release_tag} already exists. Use a new Conventional Commit or manual release_type override after the next commit."
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
            echo "::error title=Tag already exists::${release_tag} already exists in Git."
            exit 1
          fi

          existing_release_titles="$(gh release list --limit 100 --json name --jq '.[].name' 2>/dev/null || true)"
          if printf '%s\n' "${existing_release_titles}" | grep -Fxq "${release_title}"; then
            echo "::error title=Release title already exists::${release_title} already exists."
            exit 1
          fi

          {
            echo "release_required=true"
            echo "release_type=${release_type}"
            echo "base_version=${base_version}"
            echo "package_version=${next_version}"
            echo "app_version=${next_version}"
            echo "short_sha=${short_sha}"
            echo "previous_tag=${previous_tag}"
            echo "commit_range=${commit_range}"
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
          } >> "${GITHUB_OUTPUT}"

      - name: Patch public runtime version
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        env:
          APP_VERSION: ${{ steps.release_meta.outputs.app_version }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const filePath = "wrangler.toml";

          const values = {
            NEXT_PUBLIC_APP_ENV: process.env.NEXT_PUBLIC_APP_ENV,
            NEXT_PUBLIC_APP_ORIGIN: process.env.NEXT_PUBLIC_APP_ORIGIN,
            NEXT_PUBLIC_API_BASE_URL: process.env.NEXT_PUBLIC_API_BASE_URL,
            NEXT_PUBLIC_AUTH_CLIENT_ID: process.env.NEXT_PUBLIC_AUTH_CLIENT_ID,
            NEXT_PUBLIC_APP_VERSION: process.env.APP_VERSION,
          };

          for (const [key, value] of Object.entries(values)) {
            if (typeof value !== "string" || value.trim().length === 0) {
              throw new Error(`${key} is required.`);
            }
          }

          if (!/^[0-9]+\.[0-9]+\.[0-9]+$/.test(values.NEXT_PUBLIC_APP_VERSION)) {
            throw new Error("NEXT_PUBLIC_APP_VERSION must be SemVer major.minor.patch.");
          }

          const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

          let current = fs.readFileSync(filePath, "utf8");

          for (const [key, value] of Object.entries(values)) {
            const pattern = new RegExp(`^${escapeRegExp(key)}\\s*=\\s*".*"$`, "m");

            if (!pattern.test(current)) {
              throw new Error(`wrangler.toml must contain ${key}.`);
            }

            current = current.replace(pattern, `${key} = ${JSON.stringify(value)}`);
          }

          fs.writeFileSync(filePath, current);
          NODE

          grep -E '^(NEXT_PUBLIC_APP_ENV|NEXT_PUBLIC_APP_ORIGIN|NEXT_PUBLIC_API_BASE_URL|NEXT_PUBLIC_AUTH_CLIENT_ID|NEXT_PUBLIC_APP_VERSION) = ' wrangler.toml

      - name: Build OpenNext Cloudflare bundle
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ steps.release_meta.outputs.app_version }}
        run: npm run build:cf

      - name: Validate OpenNext output
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f .open-next/worker.js ]]; then
            echo "::error title=Missing OpenNext Worker::Expected .open-next/worker.js after npm run build:cf."
            exit 1
          fi

          if [[ ! -d .open-next/assets ]]; then
            echo "::error title=Missing OpenNext assets::Expected .open-next/assets after npm run build:cf."
            exit 1
          fi

      - name: Wrangler dry-run bundle
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
        run: npm exec -- wrangler deploy --dry-run

      - name: Deploy Cloudflare Worker
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
        run: npm exec -- wrangler deploy

      - name: Smoke check frontend
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          trap 'rm -f "${response_file}"' EXIT

          frontend_smoke_url="${NEXT_PUBLIC_APP_ORIGIN%/}/login"

          for attempt in {1..8}; do
            status_code="$(
              curl \
                --silent \
                --show-error \
                --location \
                --max-time 20 \
                --output "${response_file}" \
                --write-out "%{http_code}" \
                "${frontend_smoke_url}" || true
            )"

            html_ok="$(
              node --input-type=module --eval '
                import fs from "node:fs";

                const filePath = process.argv[1];

                try {
                  const body = fs.readFileSync(filePath, "utf8");
                  const ok = /<html[\s>]/i.test(body) && /(Sign in|Ozotec|ERP)/i.test(body);
                  process.stdout.write(ok ? "true" : "false");
                } catch {
                  process.stdout.write("false");
                }
              ' "${response_file}"
            )"

            if [[ "${status_code}" == "200" && "${html_ok}" == "true" ]]; then
              exit 0
            fi

            if [[ "${attempt}" -lt 8 ]]; then
              echo "Frontend smoke check attempt ${attempt} failed: status=${status_code}, html_ok=${html_ok}. Retrying..."
              sleep 10
            fi
          done

          echo "::error title=Frontend smoke check failed::Expected 200 HTML response from ${frontend_smoke_url}."
          echo "Final HTTP status: ${status_code}"
          head -c 4000 "${response_file}" || true
          exit 1

      - name: Build release notes
        if: steps.release_meta.outputs.release_required == 'true'
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          commit_subject="$(git log -1 --pretty=%s)"
          commit_body="$(git log -1 --pretty=%b)"
          commit_author="$(git log -1 --pretty='%an <%ae>')"
          commit_date="$(git log -1 --date=iso-strict --pretty=%cd)"
          commit_sha="${GITHUB_SHA}"
          short_sha="${{ steps.release_meta.outputs.short_sha }}"
          base_version="${{ steps.release_meta.outputs.base_version }}"
          package_version="${{ steps.release_meta.outputs.package_version }}"
          release_type="${{ steps.release_meta.outputs.release_type }}"
          previous_tag="${{ steps.release_meta.outputs.previous_tag }}"
          commit_range="${{ steps.release_meta.outputs.commit_range }}"
          release_tag="${{ steps.release_meta.outputs.release_tag }}"

          notes_file="release-notes.md"

          changelog_args=()
          if [[ -n "${commit_range}" ]]; then
            changelog_args+=("${commit_range}")
          else
            changelog_args+=("--max-count=50")
          fi

          changelog="$(git log "${changelog_args[@]}" --pretty='- %s (`%h`)' --no-merges)"
          if [[ -z "${changelog}" ]]; then
            changelog="- ${commit_subject} (`${short_sha}`)"
          fi

          {
            echo "## Deployment Summary"
            echo
            echo "- Worker: \`${WORKER_NAME}\`"
            echo "- Route: \`${WORKER_ROUTE}\`"
            echo "- Frontend origin: \`${NEXT_PUBLIC_APP_ORIGIN}\`"
            echo "- API origin: \`${NEXT_PUBLIC_API_BASE_URL}\`"
            echo "- Environment: \`production\`"
            echo "- Release type: \`${release_type}\`"
            echo "- Previous version: \`${base_version}\`"
            echo "- Version: \`${package_version}\`"
            echo "- Previous tag: \`${previous_tag:-none}\`"
            echo "- Commit: \`${short_sha}\`"
            echo "- Workflow run: \`${GITHUB_RUN_ID}\`"
            echo "- Release tag: \`${release_tag}\`"
            echo
            echo "## Changelog"
            echo
            printf '%s\n' "${changelog}"
            echo
            echo "## Commit Message"
            echo
            echo "### ${commit_subject}"
            echo
            if [[ -n "${commit_body}" ]]; then
              printf '%s\n\n' "${commit_body}"
            else
              echo "_No extended commit body was provided._"
              echo
            fi
            echo "## Commit Metadata"
            echo
            echo "- Author: ${commit_author}"
            echo "- Commit date: ${commit_date}"
            echo "- Full SHA: \`${commit_sha}\`"
            echo
            echo "## Verification"
            echo
            echo "- \`npm ci --include=dev\` completed"
            echo "- \`npm exec -- wrangler --version\` completed"
            echo "- \`npm run typecheck\` completed"
            echo "- \`npm run lint\` completed"
            echo "- \`npm run format:check\` completed"
            echo "- \`npm run test\` completed"
            echo "- \`npm audit --omit=dev --audit-level=high\` completed"
            echo "- Worker deployment manifest validated using TOML parsing"
            echo "- Public runtime version patched to \`${package_version}\`"
            echo "- \`npm run build:cf\` completed"
            echo "- OpenNext output validated"
            echo "- Wrangler dry-run completed"
            echo "- Cloudflare Worker deploy completed"
            echo "- Frontend \`/login\` smoke check completed"
          } > "${notes_file}"

          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release create "${{ steps.release_meta.outputs.release_tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.release_meta.outputs.release_title }}" \
            --notes-file "${{ steps.release_notes.outputs.notes_file }}" \
            --latest

      - name: Deployment summary
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## oz-next-app deployment"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Worker | ${WORKER_NAME} |"
            echo "| Route | ${WORKER_ROUTE} |"
            echo "| Frontend origin | ${NEXT_PUBLIC_APP_ORIGIN} |"
            echo "| API origin | ${NEXT_PUBLIC_API_BASE_URL} |"
            echo "| Release type | ${{ steps.release_meta.outputs.release_type }} |"
            echo "| Previous version | ${{ steps.release_meta.outputs.base_version }} |"
            echo "| Version | ${{ steps.release_meta.outputs.package_version }} |"
            echo "| Commit | ${GITHUB_SHA} |"
            echo "| Release | ${{ steps.release_meta.outputs.release_tag }} |"
            echo "| Smoke check | /login passed |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: No release summary
        if: steps.release_meta.outputs.release_required != 'true'
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## oz-next-app verification completed"
            echo ""
            echo "No production Worker deploy or GitHub release was created because no releasable Conventional Commit was detected."
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Requested release type | ${REQUESTED_RELEASE_TYPE} |"
            echo "| Base version | ${{ steps.release_meta.outputs.base_version }} |"
            echo "| Previous tag | ${{ steps.release_meta.outputs.previous_tag }} |"
            echo "| Commit | ${GITHUB_SHA} |"
          } >> "${GITHUB_STEP_SUMMARY}"
