# oz-next-app/.github/workflows/deploy.yml
name: Deploy oz-next-app to Cloudflare Worker

run-name: Deploy oz-next-app @ ${{ github.sha }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type override. Use auto for Conventional Commit based versioning."
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
          - none

concurrency:
  group: oz-next-app-production-worker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-deploy-release:
    name: Verify, build, deploy, and release
    runs-on: ubuntu-24.04
    environment: production
    timeout-minutes: 45

    env:
      CI: "true"
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_VERSION: "24"

      WORKER_NAME: oz-next-app
      WORKER_ROUTE: erp.ozotecev.com/*
      RELEASE_NAME: oz-next-app
      REQUESTED_RELEASE_TYPE:
        ${{ github.event_name == 'workflow_dispatch' && inputs.release_type || 'auto' }}

      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_APP_ORIGIN: https://erp.ozotecev.com
      NEXT_PUBLIC_API_BASE_URL: https://api.erp.ozotecev.com
      NEXT_PUBLIC_AUTH_CLIENT_ID: erp-web

      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch git tags
        shell: bash
        run: git fetch --force --tags

      - name: Validate required deployment config
        shell: bash
        run: |
          set -euo pipefail

          required_env=(
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            WORKER_NAME
            WORKER_ROUTE
            NEXT_PUBLIC_APP_ENV
            NEXT_PUBLIC_APP_ORIGIN
            NEXT_PUBLIC_API_BASE_URL
            NEXT_PUBLIC_AUTH_CLIENT_ID
          )

          missing=0
          for key in "${required_env[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error title=Missing deployment config::${key} is not configured."
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

          case "${WORKER_ROUTE}" in
            */*) ;;
            *)
              echo "::error title=Invalid WORKER_ROUTE::Worker route must include a path suffix such as /*."
              exit 1
              ;;
          esac

          case "${NEXT_PUBLIC_APP_ORIGIN}" in
            https://*) ;;
            *)
              echo "::error title=Invalid frontend origin::NEXT_PUBLIC_APP_ORIGIN must be an HTTPS origin."
              exit 1
              ;;
          esac

          case "${NEXT_PUBLIC_API_BASE_URL}" in
            https://api.erp.ozotecev.com|https://api.ozotecev.com) ;;
            *)
              echo "::error title=Invalid API origin::NEXT_PUBLIC_API_BASE_URL must point to the public oz-erp-edge Worker origin, not Cloud Run."
              exit 1
              ;;
          esac

          if printf '%s' "${NEXT_PUBLIC_API_BASE_URL}" | grep -Eiq '(run\.app|cloudrun|localhost|127\.0\.0\.1)'; then
            echo "::error title=Unsafe API origin::NEXT_PUBLIC_API_BASE_URL must not point to Cloud Run, localhost, or private backend infrastructure."
            exit 1
          fi

      - name: Validate Worker deployment manifest
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f wrangler.jsonc ]]; then
            echo "::error title=Legacy Wrangler config present::Remove wrangler.jsonc. oz-next-app must use wrangler.toml as the only deployment manifest."
            exit 1
          fi

          if [[ ! -f wrangler.toml ]]; then
            echo "::error title=Missing wrangler.toml::Cloudflare Worker deployment requires wrangler.toml."
            exit 1
          fi

          if ! grep -Eq '^name = "oz-next-app"$' wrangler.toml; then
            echo "::error title=Invalid Worker name::wrangler.toml must deploy the oz-next-app Worker."
            exit 1
          fi

          if ! grep -Eq '^main = "\.open-next/worker\.js"$' wrangler.toml; then
            echo "::error title=Invalid Worker entrypoint::wrangler.toml main must be .open-next/worker.js."
            exit 1
          fi

          if ! grep -Eq '^workers_dev = false$' wrangler.toml; then
            echo "::error title=Unsafe Worker exposure::workers_dev must be false for production."
            exit 1
          fi

          if ! grep -Fq "pattern = \"${WORKER_ROUTE}\"" wrangler.toml; then
            echo "::error title=Route mismatch::wrangler.toml route must include ${WORKER_ROUTE}."
            exit 1
          fi

          if ! grep -Eq '^binding = "ASSETS"$' wrangler.toml; then
            echo "::error title=Missing ASSETS binding::OpenNext Worker assets binding is required."
            exit 1
          fi

          if ! grep -Eq '^directory = "\.open-next/assets"$' wrangler.toml; then
            echo "::error title=Invalid assets directory::OpenNext assets directory must be .open-next/assets."
            exit 1
          fi

          if ! grep -Eq '^binding = "WORKER_SELF_REFERENCE"$' wrangler.toml; then
            echo "::error title=Missing self-reference service::OpenNext requires WORKER_SELF_REFERENCE."
            exit 1
          fi

          if ! grep -Eq '^service = "oz-next-app"$' wrangler.toml; then
            echo "::error title=Invalid self-reference service::WORKER_SELF_REFERENCE service must be oz-next-app."
            exit 1
          fi

          if ! grep -Eq '^[[:space:]]*"nodejs_compat",$|^[[:space:]]*"nodejs_compat"$' wrangler.toml; then
            echo "::error title=Missing compatibility flag::nodejs_compat is required for OpenNext Cloudflare."
            exit 1
          fi

          if ! grep -Eq '^region = "gcp:asia-south1"$' wrangler.toml; then
            echo "::error title=Invalid placement::wrangler.toml placement region must be gcp:asia-south1."
            exit 1
          fi

          if grep -Eiq '(CLOUD_RUN|DATABASE_URL|REDIS_URL|JWT_|SERVICE_ACCOUNT|SECRET|PRIVATE_KEY|TOKEN_HASH|TASK_SHARED_SECRET|R2_SECRET|WEBHOOK|OTP_HMAC|run\.app)' wrangler.toml; then
            echo "::error title=Secret or private backend config leaked::wrangler.toml must contain only public frontend runtime variables."
            exit 1
          fi

          if grep -Eq 'NEXT_PUBLIC_API_BASE_URL = ".*(run\.app|cloudrun|localhost|127\.0\.0\.1).*"' wrangler.toml; then
            echo "::error title=Unsafe API base URL::NEXT_PUBLIC_API_BASE_URL must point to oz-erp-edge, not private infrastructure."
            exit 1
          fi

          required_public_vars=(
            NEXT_PUBLIC_APP_ENV
            NEXT_PUBLIC_APP_ORIGIN
            NEXT_PUBLIC_API_BASE_URL
            NEXT_PUBLIC_AUTH_CLIENT_ID
            NEXT_PUBLIC_APP_VERSION
          )

          for key in "${required_public_vars[@]}"; do
            if ! grep -Eq "^${key} = \".+\"$" wrangler.toml; then
              echo "::error title=Missing public runtime variable::wrangler.toml must define ${key}."
              exit 1
            fi
          done

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          package_json_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [[ ! "${package_json_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid package version::package.json version must be SemVer major.minor.patch."
            exit 1
          fi

          short_sha="$(git rev-parse --short=12 HEAD)"
          requested_release_type="${REQUESTED_RELEASE_TYPE:-auto}"

          case "${requested_release_type}" in
            auto|patch|minor|major|none) ;;
            *)
              echo "::error title=Invalid release type::release_type must be auto, patch, minor, major, or none."
              exit 1
              ;;
          esac

          version_candidates="$({
            gh release list --limit 100 --json tagName,name --jq '.[] | [.tagName, .name] | .[]' 2>/dev/null || true
            git tag --list "${RELEASE_NAME}-v*" || true
          } | awk -v tag_prefix="${RELEASE_NAME}-v" -v title_prefix="${RELEASE_NAME} v" '
            index($0, tag_prefix) == 1 {
              value = substr($0, length(tag_prefix) + 1)
              if (match(value, /^[0-9]+\.[0-9]+\.[0-9]+/)) {
                print substr(value, RSTART, RLENGTH)
              }
            }
            index($0, title_prefix) == 1 {
              value = substr($0, length(title_prefix) + 1)
              if (match(value, /^[0-9]+\.[0-9]+\.[0-9]+/)) {
                print substr(value, RSTART, RLENGTH)
              }
            }
          ' | sort -Vu | uniq)"

          base_version="$(printf '%s\n' "${version_candidates}" | sed '/^$/d' | tail -n 1)"
          first_release=false
          if [[ -z "${base_version}" ]]; then
            base_version="${package_json_version}"
            first_release=true
          fi

          previous_tag=""
          if [[ "${first_release}" == "false" ]]; then
            previous_tag="$(git tag --list "${RELEASE_NAME}-v${base_version}*" | sort -V | tail -n 1 || true)"

            if [[ -z "${previous_tag}" ]]; then
              previous_tag="$(gh release list --limit 100 --json tagName,name --jq '.[] | [.tagName, .name] | @tsv' 2>/dev/null \
                | awk -F '\t' -v release_name="${RELEASE_NAME}" -v version="${base_version}" '
                    $1 ~ "^" release_name "-v" version { print $1; exit }
                    $2 == release_name " v" version { print $1; exit }
                  ' || true)"
            fi
          fi

          commit_range=""
          if [[ -n "${previous_tag}" ]] && git rev-parse -q --verify "${previous_tag}^{commit}" >/dev/null; then
            commit_range="${previous_tag}..HEAD"
          fi

          git_log_args=()
          if [[ -n "${commit_range}" ]]; then
            git_log_args+=("${commit_range}")
          fi

          commit_messages="$(git log "${git_log_args[@]}" --pretty=%B)"

          release_type="none"
          if [[ "${requested_release_type}" == "none" ]]; then
            release_type="none"
          elif [[ "${requested_release_type}" != "auto" ]]; then
            release_type="${requested_release_type}"
          elif printf '%s\n' "${commit_messages}" | grep -Eq '(^BREAKING CHANGE:|^BREAKING-CHANGE:|^[a-zA-Z]+(\([^)]+\))?!:)'; then
            release_type="major"
          elif printf '%s\n' "${commit_messages}" | grep -Eq '^feat(\([^)]+\))?:'; then
            release_type="minor"
          elif printf '%s\n' "${commit_messages}" | grep -Eq '^(fix|perf|security|revert)(\([^)]+\))?:'; then
            release_type="patch"
          fi

          if [[ "${release_type}" == "none" ]]; then
            echo "::notice title=No production release::No releasable Conventional Commit was found. Verification completed; Worker deploy and GitHub release steps will be skipped."
            {
              echo "release_required=false"
              echo "release_type=none"
              echo "base_version=${base_version}"
              echo "previous_tag=${previous_tag}"
              echo "commit_range=${commit_range}"
              echo "short_sha=${short_sha}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          IFS='.' read -r current_major current_minor current_patch <<< "${base_version}"

          if [[ "${first_release}" == "true" ]]; then
            next_version="${base_version}"
          elif [[ "${release_type}" == "major" ]]; then
            next_version="$((current_major + 1)).0.0"
          elif [[ "${release_type}" == "minor" ]]; then
            next_version="${current_major}.$((current_minor + 1)).0"
          else
            next_version="${current_major}.${current_minor}.$((current_patch + 1))"
          fi

          release_tag="${RELEASE_NAME}-v${next_version}"
          release_title="${RELEASE_NAME} v${next_version}"

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            echo "::error title=Release already exists::${release_tag} already exists. Use a new Conventional Commit or manual release_type override after the next commit."
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
            echo "::error title=Tag already exists::${release_tag} already exists in Git."
            exit 1
          fi

          existing_release_titles="$(gh release list --limit 100 --json name --jq '.[].name' 2>/dev/null || true)"
          if printf '%s\n' "${existing_release_titles}" | grep -Fxq "${release_title}"; then
            echo "::error title=Release title already exists::${release_title} already exists."
            exit 1
          fi

          {
            echo "release_required=true"
            echo "release_type=${release_type}"
            echo "base_version=${base_version}"
            echo "package_version=${next_version}"
            echo "app_version=${next_version}"
            echo "short_sha=${short_sha}"
            echo "previous_tag=${previous_tag}"
            echo "commit_range=${commit_range}"
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
          } >> "${GITHUB_OUTPUT}"

      - name: Patch public runtime version
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        env:
          APP_VERSION: ${{ steps.release_meta.outputs.app_version }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const filePath = 'wrangler.toml';

          const values = {
            NEXT_PUBLIC_APP_ENV: process.env.NEXT_PUBLIC_APP_ENV,
            NEXT_PUBLIC_APP_ORIGIN: process.env.NEXT_PUBLIC_APP_ORIGIN,
            NEXT_PUBLIC_API_BASE_URL: process.env.NEXT_PUBLIC_API_BASE_URL,
            NEXT_PUBLIC_AUTH_CLIENT_ID: process.env.NEXT_PUBLIC_AUTH_CLIENT_ID,
            NEXT_PUBLIC_APP_VERSION: process.env.APP_VERSION,
          };

          for (const [key, value] of Object.entries(values)) {
            if (typeof value !== 'string' || value.trim().length === 0) {
              throw new Error(`${key} is required.`);
            }
          }

          if (!/^[0-9]+\.[0-9]+\.[0-9]+$/.test(values.NEXT_PUBLIC_APP_VERSION)) {
            throw new Error('NEXT_PUBLIC_APP_VERSION must be SemVer major.minor.patch.');
          }

          const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

          let current = fs.readFileSync(filePath, 'utf8');

          for (const [key, value] of Object.entries(values)) {
            const pattern = new RegExp(`^${escapeRegExp(key)}\\s*=\\s*".*"$`, 'm');
            if (!pattern.test(current)) {
              throw new Error(`wrangler.toml must contain ${key}.`);
            }

            current = current.replace(pattern, `${key} = ${JSON.stringify(value)}`);
          }

          fs.writeFileSync(filePath, current);
          NODE

          grep -E '^(NEXT_PUBLIC_APP_ENV|NEXT_PUBLIC_APP_ORIGIN|NEXT_PUBLIC_API_BASE_URL|NEXT_PUBLIC_AUTH_CLIENT_ID|NEXT_PUBLIC_APP_VERSION) = ' wrangler.toml

      - name: Build OpenNext Cloudflare bundle
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ steps.release_meta.outputs.app_version }}
        run: npm run build:cf

      - name: Validate OpenNext output
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f .open-next/worker.js ]]; then
            echo "::error title=Missing OpenNext Worker::Expected .open-next/worker.js after npm run build:cf."
            exit 1
          fi

          if [[ ! -d .open-next/assets ]]; then
            echo "::error title=Missing OpenNext assets::Expected .open-next/assets after npm run build:cf."
            exit 1
          fi

      - name: Wrangler dry-run bundle
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy --dry-run

      - name: Deploy Cloudflare Worker
        if: steps.release_meta.outputs.release_required == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Smoke check frontend
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          trap 'rm -f "${response_file}"' EXIT

          frontend_smoke_url="${NEXT_PUBLIC_APP_ORIGIN%/}/login"

          for attempt in {1..8}; do
            status_code="$(
              curl \
                --silent \
                --show-error \
                --location \
                --max-time 20 \
                --output "${response_file}" \
                --write-out "%{http_code}" \
                "${frontend_smoke_url}" || true
            )"

            html_ok="$(
              node --input-type=module --eval '
                import fs from "node:fs";

                const filePath = process.argv[1];
                try {
                  const body = fs.readFileSync(filePath, "utf8");
                  const ok = /<html[\s>]/i.test(body) && /(Sign in|Ozotec|ERP)/i.test(body);
                  process.stdout.write(ok ? "true" : "false");
                } catch {
                  process.stdout.write("false");
                }
              ' "${response_file}"
            )"

            if [[ "${status_code}" == "200" && "${html_ok}" == "true" ]]; then
              exit 0
            fi

            if [[ "${attempt}" -lt 8 ]]; then
              echo "Frontend smoke check attempt ${attempt} failed: status=${status_code}, html_ok=${html_ok}. Retrying..."
              sleep 10
            fi
          done

          echo "::error title=Frontend smoke check failed::Expected 200 HTML response from ${frontend_smoke_url}."
          echo "Final HTTP status: ${status_code}"
          head -c 4000 "${response_file}" || true
          exit 1

      - name: Build release notes
        if: steps.release_meta.outputs.release_required == 'true'
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          commit_subject="$(git log -1 --pretty=%s)"
          commit_body="$(git log -1 --pretty=%b)"
          commit_author="$(git log -1 --pretty='%an <%ae>')"
          commit_date="$(git log -1 --date=iso-strict --pretty=%cd)"
          commit_sha="${GITHUB_SHA}"
          short_sha="${{ steps.release_meta.outputs.short_sha }}"
          base_version="${{ steps.release_meta.outputs.base_version }}"
          package_version="${{ steps.release_meta.outputs.package_version }}"
          release_type="${{ steps.release_meta.outputs.release_type }}"
          previous_tag="${{ steps.release_meta.outputs.previous_tag }}"
          commit_range="${{ steps.release_meta.outputs.commit_range }}"
          release_tag="${{ steps.release_meta.outputs.release_tag }}"

          notes_file="release-notes.md"

          changelog_args=()
          if [[ -n "${commit_range}" ]]; then
            changelog_args+=("${commit_range}")
          else
            changelog_args+=("--max-count=50")
          fi

          changelog="$(git log "${changelog_args[@]}" --pretty='- %s (`%h`)' --no-merges)"
          if [[ -z "${changelog}" ]]; then
            changelog="- ${commit_subject} (`${short_sha}`)"
          fi

          {
            echo "## Deployment Summary"
            echo
            echo "- Worker: \`${WORKER_NAME}\`"
            echo "- Route: \`${WORKER_ROUTE}\`"
            echo "- Frontend origin: \`${NEXT_PUBLIC_APP_ORIGIN}\`"
            echo "- API origin: \`${NEXT_PUBLIC_API_BASE_URL}\`"
            echo "- Environment: \`production\`"
            echo "- Release type: \`${release_type}\`"
            echo "- Previous version: \`${base_version}\`"
            echo "- Version: \`${package_version}\`"
            echo "- Previous tag: \`${previous_tag:-none}\`"
            echo "- Commit: \`${short_sha}\`"
            echo "- Workflow run: \`${GITHUB_RUN_ID}\`"
            echo "- Release tag: \`${release_tag}\`"
            echo
            echo "## Changelog"
            echo
            printf '%s\n' "${changelog}"
            echo
            echo "## Commit Message"
            echo
            echo "### ${commit_subject}"
            echo
            if [[ -n "${commit_body}" ]]; then
              printf '%s\n\n' "${commit_body}"
            else
              echo "_No extended commit body was provided._"
              echo
            fi
            echo "## Commit Metadata"
            echo
            echo "- Author: ${commit_author}"
            echo "- Commit date: ${commit_date}"
            echo "- Full SHA: \`${commit_sha}\`"
            echo
            echo "## Verification"
            echo
            echo "- \`npm ci\` completed"
            echo "- \`npm run typecheck\` completed"
            echo "- \`npm run lint\` completed"
            echo "- \`npm run format:check\` completed"
            echo "- \`npm run test\` completed"
            echo "- \`npm audit --omit=dev --audit-level=high\` completed"
            echo "- Worker deployment manifest validated"
            echo "- Public runtime version patched to \`${package_version}\`"
            echo "- \`npm run build:cf\` completed"
            echo "- OpenNext output validated"
            echo "- Wrangler dry-run bundle completed"
            echo "- Cloudflare Worker deploy completed"
            echo "- Frontend \`/login\` smoke check completed"
          } > "${notes_file}"

          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release create "${{ steps.release_meta.outputs.release_tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.release_meta.outputs.release_title }}" \
            --notes-file "${{ steps.release_notes.outputs.notes_file }}" \
            --latest

      - name: Deployment summary
        if: steps.release_meta.outputs.release_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## oz-next-app deployment"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Worker | ${WORKER_NAME} |"
            echo "| Route | ${WORKER_ROUTE} |"
            echo "| Frontend origin | ${NEXT_PUBLIC_APP_ORIGIN} |"
            echo "| API origin | ${NEXT_PUBLIC_API_BASE_URL} |"
            echo "| Release type | ${{ steps.release_meta.outputs.release_type }} |"
            echo "| Previous version | ${{ steps.release_meta.outputs.base_version }} |"
            echo "| Version | ${{ steps.release_meta.outputs.package_version }} |"
            echo "| Commit | ${GITHUB_SHA} |"
            echo "| Release | ${{ steps.release_meta.outputs.release_tag }} |"
            echo "| Smoke check | /login passed |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: No release summary
        if: steps.release_meta.outputs.release_required != 'true'
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## oz-next-app verification completed"
            echo ""
            echo "No production Worker deploy or GitHub release was created because no releasable Conventional Commit was detected."
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Requested release type | ${REQUESTED_RELEASE_TYPE} |"
            echo "| Base version | ${{ steps.release_meta.outputs.base_version }} |"
            echo "| Previous tag | ${{ steps.release_meta.outputs.previous_tag }} |"
            echo "| Commit | ${GITHUB_SHA} |"
          } >> "${GITHUB_STEP_SUMMARY}"